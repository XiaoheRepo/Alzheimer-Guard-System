spring:
  application:
    name: guard-server-java

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/guard_db}
    username: ${DB_USER:guard}
    password: ${DB_PASSWORD:guard}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: guard-server
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    default-fetch-size: 100
    default-statement-timeout: 30

guard:
  jwt:
    secret: ${JWT_SECRET:guard-server-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiration-ms: ${JWT_EXPIRATION:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  ai:
    api-key: ${DASHSCOPE_API_KEY:}
    model-name: ${AI_MODEL_NAME:qwen-max-latest}
    # 每用户每日 token 配额（毕设默认 20000）
    user-daily-quota: ${AI_USER_DAILY_QUOTA:20000}
    # 每患者每日 token 配额
    patient-daily-quota: ${AI_PATIENT_DAILY_QUOTA:50000}
  entry-token:
    ttl-seconds: 120
  ws-ticket:
    ttl-seconds: 30
  public-entry-base-url: ${PUBLIC_ENTRY_BASE_URL:https://app.example.com}
  outbox:
    polling-interval-ms: 1000
    batch-size: 50
    max-retry: 5
    dead-threshold: 10
  rate-limit:
    anonymous-per-ip-per-minute: 30
    anonymous-per-device-per-minute: 10
    login-per-ip-per-minute: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.xiaohelab.guard: DEBUG
    org.springframework.security: INFO
