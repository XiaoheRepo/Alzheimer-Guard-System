spring:
  application:
    name: guard-server-java

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/alzheimer_system}
    username: ${DB_USER:alzheimer_admin}
    password: ${DB_PASSWORD:Alzheimer_db_pass_2026!}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:Alzheimer_redis_pass_2026!}
      database: 0
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2

  mail:
    host: ${EMAIL_SMTP_HOST:smtp.aliyun.com}
    port: ${EMAIL_SMTP_PORT:465}
    username: ${EMAIL_SMTP_USERNAME:}
    password: ${EMAIL_SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true

  jackson:
    time-zone: UTC
    # 全局字段命名策略：Java 驼峰 <-> JSON 蛇形（API V2.0 §1.4 契约基线）
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: NON_NULL
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  servlet:
    context-path: /

guard:
  jwt:
    secret: ${JWT_SECRET:guard-server-secret-key-must-be-at-least-256-bits-long-for-hs256}
    expiration-ms: ${JWT_EXPIRATION:86400000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  ai:
    api-key: ${DASHSCOPE_API_KEY:}
    model-name: ${AI_MODEL_NAME:qwen-max-latest}
    # 每用户每日 token 配额（毕设默认 20000）
    user-daily-quota: ${AI_USER_DAILY_QUOTA:20000}
    # 每患者每日 token 配额
    patient-daily-quota: ${AI_PATIENT_DAILY_QUOTA:50000}
  entry-token:
    ttl-seconds: 120
  ws-ticket:
    ttl-seconds: 30
  public-entry-base-url: ${PUBLIC_ENTRY_BASE_URL:https://app.example.com}
  outbox:
    polling-interval-ms: 5000
    batch-size: 50
    max-retry: 5
    dead-threshold: 10
  rate-limit:
    anonymous-per-ip-per-minute: 30
    anonymous-per-device-per-minute: 10
  cors:
    # 逗号分隔，或在环境变量 CORS_ALLOWED_ORIGINS 中覆盖
    allowed-origins:
      - http://localhost:5173
      - http://localhost:5174
      - ${CORS_EXTRA_ORIGIN:}
    login-per-ip-per-minute: 10
  init:
    super-admin-username: ${SUPER_ADMIN_USERNAME:superadmin}
    super-admin-password: ${SUPER_ADMIN_PASSWORD:Admin@2026!}
    super-admin-email: ${SUPER_ADMIN_EMAIL:admin@xiaohelab.com}


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    disable-swagger-default-url: true
    display-request-duration: true
  packages-to-scan: com.xiaohelab.guard.server

# ===== 外部服务接入（backend_handbook §19 基线） =====
aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-hangzhou.aliyuncs.com}
    bucket: ${ALIYUN_OSS_BUCKET:alzheimer-rescue}
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
    url-expiration-seconds: 3600
    max-file-size-mb: 10
    public-cdn: ${ALIYUN_OSS_CDN:}

ai:
  dashscope:
    api-key: ${AI_DASHSCOPE_API_KEY:}
    chat:
      model: ${AI_CHAT_MODEL:glm-5.1}
      fallback-model: ${AI_CHAT_FALLBACK_MODEL:glm-5.1}
      timeout-ms: 30000
      max-tokens: 4096
    image:
      model: ${AI_IMAGE_MODEL:wanx-v1}
      size: 1024*1024
    embedding:
      model: text-embedding-v3

notification:
  jpush-enabled: ${JPUSH_ENABLED:false}
  email-enabled: ${EMAIL_ENABLED:false}
  jpush:
    app-key: ${JPUSH_APP_KEY:}
    master-secret: ${JPUSH_MASTER_SECRET:}
    retry-max: 3
    live-time: 86400
    apns-production: ${JPUSH_APNS_PROD:false}
  email:
    from-address: ${EMAIL_FROM:noreply@alzheimer-rescue.com}
    from-name: 阿尔兹海默症协同寻回系统
  sms:
    enabled: false

amap:
  api-key: ${AMAP_API_KEY:}
  base-url: https://restapi.amap.com/v3
  timeout-ms: 3000
  daily-limit: 5000

logging:
  level:
    com.xiaohelab.guard: DEBUG
    org.springframework.security: INFO